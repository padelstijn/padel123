<head>
    <meta charset="UTF-8">

    <title>Padel123 Trainer Tool</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 10px;
        }

        #tabs {
            margin-bottom: 15px;
        }

        #tabs button {
            margin: 3px;
            padding: 8px 12px;
            cursor: pointer;
            border: none;
            background: #ddd;
            border-radius: 6px;
        }

        #tabs button:hover {
            background: #bbb;
        }

        .controls {
            margin-bottom: 20px;
        }

        .controls button {
            margin-right: 10px;
            padding: 8px 12px;
            cursor: pointer;
        }

        #form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 900px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        input, textarea {
            padding: 6px;
