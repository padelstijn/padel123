<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Padel123 AI Coach LIVE</title>

<style>
body { font-family: Arial; padding: 20px; background:#f4f4f4; }
#tabs button { margin:3px; padding:8px; }
.controls button { margin:5px; padding:8px; }
#form { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
input, textarea { padding:6px; }
textarea { min-height:60px; }
</style>
</head>

<body>

<h1>🎾 Padel123 LIVE Coach</h1>

<div id="tabs"></div>

<div class="controls">
<button onclick="saveLesson()">💾 Save</button>
<button onclick="exportToGoogle()">☁ Push to Google</button>
<button onclick="loadFromGoogle()">🔄 Pull from Google</button>
<button onclick="exportToFile()">⬇ Export JSON</button>
<input type="file" onchange="importFile(event)">
</div>

<div id="form"></div>

<script src="app.js"></script>

</body>
</html>
