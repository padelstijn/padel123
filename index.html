<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>PADEL123 V8 AI COACH</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🎾 PADEL123 V8 AI COACH</h1>
</header>

<section class="grid">

  <div class="card">
    <h2>🧠 AI Coach</h2>
    <button onclick="whatTrainTomorrow()">Wat train ik morgen?</button>
    <div id="aiOutput"></div>
  </div>

  <div class="card">
    <h2>📅 12-week Planner</h2>
    <button onclick="generatePlan()">Genereer plan</button>
    <div id="planOutput"></div>
  </div>

  <div class="card">
    <h2>🎯 Lesson Builder</h2>
    <textarea id="lessonInput" placeholder="Plak les data (44 kolommen JSON)"></textarea>
    <button onclick="saveLesson()">Opslaan les</button>
  </div>

  <div class="card">
    <h2>📊 Player Progress</h2>
    <button onclick="loadPlayers()">Laad spelers</button>
    <div id="playerOutput"></div>
  </div>

</section>

<script src="app.js"></script>

</body>
</html>
