<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Padel Coach v5</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎾 Padel Coach v5</h1>

<div id="topbar">
  <button onclick="saveGlobal()">💾 Save Global</button>
  <button onclick="exportJSON()">JSON</button>
  <button onclick="exportCSV()">CSV</button>

</div>

<div id="tabs"></div>

<div id="global">
  <h2>Global Coach Settings</h2>
  <input id="Trainer" placeholder="Trainer">
  <input id="Lesgroep" placeholder="Lesgroep">
  <input id="Lesduur" placeholder="Lesduur">
</div>

<hr>

<div id="form"></div>

<script src="db.js"></script>
<script src="app.js"></script>

</body>
